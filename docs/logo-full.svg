<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="40" height="40" fill="transparent"/>
    
    <!-- Central "eye" or core -->
    <circle cx="20" cy="20" r="8" stroke="url(#matrixGradient)" stroke-width="2" fill="rgba(0,245,255,0.1)"/>
    <circle cx="20" cy="20" r="3" fill="url(#matrixGradient)"/>

    <!-- Abstract "tentacles" or sensors -->
    <path d="M20 12 C28 8, 35 15, 30 20 S28 32, 20 28 M20 28 C12 32, 5 25, 10 20 S12 8, 20 12" stroke="url(#matrixGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <path d="M15 20 L5 25 M25 20 L35 25" stroke="url(#matrixGradient)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M20 12 C23 10, 27 10, 30 12" stroke="url(#matrixGradient)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M20 28 C17 30, 13 30, 10 28" stroke="url(#matrixGradient)" stroke-width="1.5" stroke-linecap="round"/>


    <defs>
        <linearGradient id="matrixGradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop stop-color="#00F5FF"/>
            <stop offset="1" stop-color="#7A00FF"/>
        </linearGradient>
    </defs>
</svg>